apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mcp-proxy.fullname" . }}-test-health"
  labels:
    {{- include "mcp-proxy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['--spider', '--timeout=5', 'http://{{ include "mcp-proxy.fullname" . }}:{{ .Values.service.port }}/admin/health']
  restartPolicy: Never
