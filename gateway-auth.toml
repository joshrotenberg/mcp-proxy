# Test config with bearer auth

[gateway]
name = "auth-gateway"
version = "0.1.0"

[gateway.listen]
host = "127.0.0.1"
port = 8081

[auth]
type = "bearer"
tokens = ["test-token-123", "another-token"]

[[backends]]
name = "files"
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/private/tmp"]

[backends.timeout]
seconds = 30

[observability]
audit = true
log_level = "info"
